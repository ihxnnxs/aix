name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: aix-linux-x64
            dist: dist/aix-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: aix-linux-arm64
            dist: dist/aix-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: aix-darwin-arm64
            dist: dist/aix-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: aix-windows-x64
            dist: dist/aix-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build
        shell: bash
        run: bun run script/build-single.ts ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a ${{ matrix.artifact }}.zip ./${{ matrix.dist }}/aix.exe
          else
            tar czf ${{ matrix.artifact }}.tar.gz -C ${{ matrix.dist }} aix
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
